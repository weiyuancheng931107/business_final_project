<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股基本面分析系統 | Neumorphism Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="app-container">
        <!-- 左側側邊欄 -->
        <aside>
            <div class="brand">
                <i class="fa-solid fa-chart-line"></i>
                基本面分析系統
            </div>

            <form id="add-stock-form" class="add-stock-form">
                <input type="text" id="stock-input" placeholder="輸入代號 (例: 2330)" autocomplete="off" aria-label="輸入台股代號">
                <button type="submit" title="新增自選股" aria-label="新增自選股">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </form>

            <div class="portfolio-list" id="portfolio-list">
                <!-- 自選股清單會用 JS 動態生成 -->
            </div>

            <!-- 比較模式區塊 -->
            <div class="compare-mode-section">
                <div class="compare-mode-header">
                    <i class="fa-solid fa-code-compare"></i>
                    比較模式
                </div>
                <div class="compare-checkboxes-list" id="compare-checkboxes-list">
                    <!-- 動態生成勾選框 -->
                </div>
                <button id="btn-start-compare" class="action-btn start-compare-btn" style="width: 100%; margin-top: 10px;">
                    <i class="fa-solid fa-play"></i> 開始比較
                </button>
            </div>

        </aside>

        <!-- 右側主內容 -->
        <main>
            <!-- 尚未選擇股票時的空狀態 -->
            <div id="empty-state" class="empty-state" style="flex: 1;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <h2>請從左側選擇一檔股票，或新增自選股</h2>
                <p>開始您的台股基本面分析之旅</p>
            </div>

            <!-- 單一股票分析主要畫面 -->
            <div id="dashboard-content" style="display: none;">
                <!-- 標題列 -->
                <header class="dashboard-header">
                    <div class="stock-title-container">
                        <h1 class="stock-title" id="display-name">---</h1>
                        <div class="stock-subtitle" id="display-symbol">---</div>
                    </div>
                </header>

                <!-- 上半部：財務卡片 -->
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-label">目前股價</div>
                        <div class="info-value" id="val-price">---</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">本益比 (P/E)</div>
                        <div class="info-value" id="val-pe">---</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">每股盈餘 (EPS)</div>
                        <div class="info-value" id="val-eps">---</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">股東權益報酬率 (ROE)</div>
                        <div class="info-value" id="val-roe">---</div>
                    </div>
                </div>

                <!-- 下半部：圖表及歷史財報頁籤 -->
                <div class="charts-section">
                    <div class="tab-nav-bar">
                        <div class="tabs" id="stock-tabs">
                            <button class="tab-btn active" data-tab="price" aria-label="歷史走勢圖">歷史走勢圖</button>
                            <button class="tab-btn" data-tab="river" aria-label="本益比河流圖">本益比河流圖</button>
                        </div>

                        <!-- 時間區間切換 -->
                        <div class="chart-controls" id="chart-periods">
                            <button class="period-btn" data-period="6mo" aria-label="6個月走勢">6M</button>
                            <button class="period-btn active" data-period="1y" aria-label="1年走勢">1Y</button>
                            <button class="period-btn" data-period="3y" aria-label="3年走勢">3Y</button>
                            <button class="period-btn" data-period="5y" aria-label="5年走勢">5Y</button>
                        </div>
                    </div>

                    <!-- 圖表區 -->
                    <div class="chart-container" id="media-viewport">
                        <div class="loader" id="chart-loader"></div>
                        <img id="chart-img" class="chart-img" src="" alt="分析圖表">
                    </div>
                </div>

                <!-- 相關新聞區區塊 -->
                <div class="news-section">
                    <div class="news-header">
                        <div class="section-label">
                            <i class="fa-solid fa-newspaper"></i> 相關新聞
                        </div>
                        <button id="btn-analyze-news" class="action-btn analyze-btn" style="margin-left: auto;">
                            <i class="fa-solid fa-brain"></i> AI 產生分析報告
                        </button>
                    </div>
                    <div class="news-list" id="news-list">
                        <!-- 動態載入新聞項目 -->
                    </div>
                    <div id="news-load-more-container" style="text-align: center; margin-top: 15px; display: none;">
                        <button id="btn-load-more-news" class="load-more-btn" aria-label="載入更多新聞">
                            <span>載入更多新聞</span>
                            <i class="fa-solid fa-angle-down"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 比較模式主要畫面 -->
            <div id="compare-dashboard" style="display: none;">
                <!-- 比較模式標題 -->
                <header class="dashboard-header">
                    <div class="stock-title-container">
                        <h1 class="stock-title"><i class="fa-solid fa-code-compare"></i> 多股比較分析</h1>
                        <button id="btn-back-to-single" class="action-btn" style="margin-left: auto;">
                            <i class="fa-solid fa-arrow-left"></i> 返回
                        </button>
                    </div>
                </header>

                <!-- 基本面卡片（多股對比） -->
                <div id="compare-info-grid" class="info-grid">
                    <!-- 動態生成 -->
                </div>

                <!-- 圖表區 -->
                <div class="charts-section">
                    <div class="tab-nav-bar">
                        <div class="tabs" id="compare-tabs">
                            <button class="tab-btn active" data-tab="normalized" aria-label="標準化走勢">標準化走勢圖</button>
                            <button class="tab-btn" data-tab="heatmap" aria-label="相關係數熱力圖">相關係數熱力圖</button>
                        </div>

                        <!-- 時間區間切換 -->
                        <div class="chart-controls" id="compare-chart-periods">
                            <button class="period-btn" data-period="6mo" aria-label="6個月">6M</button>
                            <button class="period-btn active" data-period="1y" aria-label="1年">1Y</button>
                            <button class="period-btn" data-period="3y" aria-label="3年">3Y</button>
                            <button class="period-btn" data-period="5y" aria-label="5年">5Y</button>
                        </div>
                    </div>

                    <div class="chart-container" id="compare-media-viewport">
                        <div class="loader" id="compare-chart-loader"></div>
                        <img id="compare-chart-img" class="chart-img" src="" alt="比較圖表">
                    </div>
                </div>

                <!-- 配對相關性分析 -->
                <div class="news-section" id="compare-pairs-section">
                    <div class="section-label" style="margin-bottom: 15px;">
                        <i class="fa-solid fa-link"></i> 股票對相關性
                    </div>
                    <div id="compare-pairs-list">
                        <!-- 動態生成 -->
                    </div>
                </div>

                <!-- 新聞跨股分析 -->
                <div class="news-section">
                    <div class="news-header">
                        <div class="section-label">
                            <i class="fa-solid fa-newspaper"></i> 多股新聞分析
                        </div>
                        <button id="btn-analyze-compare-news" class="action-btn analyze-btn" style="margin-left: auto;">
                            <i class="fa-solid fa-brain"></i> AI 跨股分析
                        </button>
                    </div>
                    <div id="compare-news-list">
                        <!-- 動態載入 -->
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- 單一股票分析 Modal -->
    <div id="analysis-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fa-solid fa-brain"></i> AI 新聞情緒分析報告</h2>
                <button id="btn-close-modal" class="close-btn" aria-label="關閉">&times;</button>
            </div>
            <div class="modal-body" id="analysis-result-content">
                <!-- 動態插入 -->
            </div>
        </div>
    </div>

    <!-- 比較分析解讀 Modal -->
    <div id="compare-interpret-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fa-solid fa-brain"></i> AI 比較分析報告</h2>
                <button id="btn-close-compare-modal" class="close-btn" aria-label="關閉">&times;</button>
            </div>
            <div class="modal-body" id="compare-interpret-result">
                <!-- 動態插入 -->
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        // ────────────────────────────────────────
        // 全局狀態管理
        // ────────────────────────────────────────
        const UI_STATE = {
            mode: 'single', // 'single' 或 'compare'
            currentSymbol: null,
            compareSymbols: new Set(),
            currentTab: 'price',
            currentPeriod: '1y',
            newsNextStartDate: null,
            newsHasMore: false,
            newsLoading: false,
            compareData: null,
        };

        // ────────────────────────────────────────
        // DOM 元素引用
        // ────────────────────────────────────────
        const portfolioListEl = document.getElementById('portfolio-list');
        const addStockForm = document.getElementById('add-stock-form');
        const stockInput = document.getElementById('stock-input');
        const emptyState = document.getElementById('empty-state');
        const dashboardContent = document.getElementById('dashboard-content');
        const compareDashboard = document.getElementById('compare-dashboard');

        // ────────────────────────────────────────
        // 工具函式
        // ────────────────────────────────────────
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.style.borderLeft = `4px solid ${type === 'error' ? 'var(--danger-color)' : 'var(--success-color)'}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ────────────────────────────────────────
        // 切換 UI 模式
        // ────────────────────────────────────────
        function switchMode(newMode) {
            UI_STATE.mode = newMode;
            if (newMode === 'single') {
                emptyState.style.display = UI_STATE.currentSymbol ? 'none' : 'flex';
                dashboardContent.style.display = UI_STATE.currentSymbol ? 'block' : 'none';
                compareDashboard.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                dashboardContent.style.display = 'none';
                compareDashboard.style.display = 'block';
            }
        }

        // ────────────────────────────────────────
        // 單一股票分析
        // ────────────────────────────────────────
        async function loadPortfolio() {
            try {
                const res = await fetch('/api/portfolio');
                const data = await res.json();
                renderPortfolio(data.stocks);
                updateCompareCheckboxes(data.stocks);
            } catch (err) {
                showToast('無法載入自選股清單', 'error');
            }
        }

        function renderPortfolio(stocks) {
            portfolioListEl.innerHTML = '';
            stocks.forEach(item => {
                const div = document.createElement('div');
                div.className = `stock-item glass ${UI_STATE.currentSymbol === item.symbol ? 'active' : ''}`;
                const infoBlock = document.createElement('div');
                infoBlock.className = 'stock-info-block';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'stock-name';
                nameSpan.textContent = item.name;
                const symbolSpan = document.createElement('span');
                symbolSpan.className = 'stock-symbol';
                symbolSpan.textContent = item.symbol;
                infoBlock.appendChild(nameSpan);
                infoBlock.appendChild(symbolSpan);
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.setAttribute('aria-label', `移除自選股 ${item.symbol}`);
                delBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeStock(item.symbol);
                };
                div.appendChild(infoBlock);
                div.appendChild(delBtn);
                div.onclick = () => {
                    if (UI_STATE.mode === 'single') {
                        loadStockAnalysis(item.symbol);
                    }
                };
                portfolioListEl.appendChild(div);
            });
        }

        function updateCompareCheckboxes(stocks) {
            const checkboxList = document.getElementById('compare-checkboxes-list');
            checkboxList.innerHTML = '';
            stocks.forEach(item => {
                const label = document.createElement('label');
                label.className = 'compare-checkbox-label';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = item.symbol;
                checkbox.checked = UI_STATE.compareSymbols.has(item.symbol);
                checkbox.onchange = (e) => {
                    if (e.target.checked) {
                        if (UI_STATE.compareSymbols.size < 6) {
                            UI_STATE.compareSymbols.add(item.symbol);
                        } else {
                            e.target.checked = false;
                            showToast('最多選擇 6 支股票', 'warning');
                        }
                    } else {
                        UI_STATE.compareSymbols.delete(item.symbol);
                    }
                };
                const span = document.createElement('span');
                span.textContent = item.name;
                label.appendChild(checkbox);
                label.appendChild(span);
                checkboxList.appendChild(label);
            });
        }

        addStockForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const symbol = stockInput.value.trim();
            if (!symbol) return;
            try {
                const res = await fetch('/api/portfolio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '新增失敗');
                stockInput.value = '';
                showToast(`已新增 ${data.name} (${data.added})`);
                await loadPortfolio();
                loadStockAnalysis(data.added);
            } catch (err) {
                showToast(err.message, 'error');
            }
        });

        async function removeStock(symbol) {
            try {
                const res = await fetch(`/api/portfolio/${symbol}`, { method: 'DELETE' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                showToast(`已成功移除股票`);
                await loadPortfolio();
                if (UI_STATE.currentSymbol === symbol) {
                    UI_STATE.currentSymbol = null;
                    switchMode('single');
                }
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function loadStockAnalysis(symbol) {
            UI_STATE.currentSymbol = symbol;
            UI_STATE.newsNextStartDate = null;
            UI_STATE.newsHasMore = false;
            UI_STATE.newsLoading = false;
            switchMode('single');
            document.querySelectorAll('.stock-item').forEach(el => {
                const sym = el.querySelector('.stock-symbol').textContent;
                el.classList.toggle('active', sym === symbol);
            });
            document.getElementById('news-load-more-container').style.display = 'none';
            try {
                document.getElementById('display-name').textContent = '載入中...';
                document.getElementById('display-symbol').textContent = symbol;
                const res = await fetch(`/api/stock/${symbol}/info`);
                const data = await res.json();
                document.getElementById('display-name').textContent = data.name || '未知名稱';
                document.getElementById('val-price').textContent = data.current_price ? `${data.current_price.toLocaleString()} 元` : 'N/A';
                document.getElementById('val-pe').textContent = data.pe_ratio ? data.pe_ratio.toFixed(2) : 'N/A';
                document.getElementById('val-eps').textContent = data.eps ? `${data.eps.toFixed(2)} 元` : 'N/A';
                document.getElementById('val-roe').textContent = data.roe ? (data.roe * 100).toFixed(2) + '%' : 'N/A';
                loadChart();
                loadNews(symbol);
            } catch (err) {
                showToast('讀取基本面資料失敗', 'error');
            }
        }

        async function loadNews(symbol, isLoadMore = false) {
            if (UI_STATE.newsLoading) return;
            UI_STATE.newsLoading = true;
            const newsListEl = document.getElementById('news-list');
            const loadMoreContainer = document.getElementById('news-load-more-container');
            const btnLoadMore = document.getElementById('btn-load-more-news');
            if (!isLoadMore) {
                newsListEl.innerHTML = '<div class="news-loading"><i class="fa-solid fa-spinner fa-spin"></i> 新聞載入中...</div>';
                loadMoreContainer.style.display = 'none';
            } else {
                btnLoadMore.disabled = true;
                btnLoadMore.querySelector('span').textContent = '載入中...';
                btnLoadMore.querySelector('i').className = 'fa-solid fa-spinner fa-spin';
            }
            try {
                const url = isLoadMore && UI_STATE.newsNextStartDate 
                    ? `/api/stock/${symbol}/news?start_date=${UI_STATE.newsNextStartDate}` 
                    : `/api/stock/${symbol}/news`;
                const res = await fetch(url);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                if (!isLoadMore) {
                    newsListEl.innerHTML = '';
                }
                if (data.news && data.news.length > 0) {
                    data.news.forEach(item => {
                        const newsItem = document.createElement('div');
                        newsItem.className = 'news-item glass';
                        newsItem.innerHTML = `
                            <a href="${item.url}" target="_blank" style="text-decoration: none; color: inherit;">
                                <div class="news-title">${item.title}</div>
                            </a>
                            <div class="news-meta">
                                <span class="news-source">${item.source}</span>
                                <span class="news-date">${item.date}</span>
                            </div>
                        `;
                        newsListEl.appendChild(newsItem);
                    });
                } else if (!isLoadMore) {
                    newsListEl.innerHTML = '<div class="news-empty">無相關新聞</div>';
                }
                UI_STATE.newsNextStartDate = data.next_start_date;
                UI_STATE.newsHasMore = data.has_more;
                loadMoreContainer.style.display = UI_STATE.newsHasMore ? 'block' : 'none';
            } catch (err) {
                if (!isLoadMore) {
                    newsListEl.innerHTML = '<div class="news-error">新聞載入失敗</div>';
                } else {
                    showToast('載入更多新聞失敗', 'error');
                }
            } finally {
                UI_STATE.newsLoading = false;
                btnLoadMore.disabled = false;
                btnLoadMore.querySelector('span').textContent = '載入更多新聞';
                btnLoadMore.querySelector('i').className = 'fa-solid fa-angle-down';
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (e.target.closest('#stock-tabs')) {
                    document.querySelectorAll('#stock-tabs .tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    UI_STATE.currentTab = e.target.dataset.tab;
                    if (UI_STATE.currentTab === 'river') {
                        setPeriodActive('3y');
                    } else {
                        setPeriodActive('1y');
                    }
                    if (UI_STATE.currentSymbol) loadChart();
                }
            });
        });

        function setPeriodActive(period) {
            UI_STATE.currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.period === period);
            });
        }

        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (e.target.closest('#chart-periods')) {
                    document.querySelectorAll('#chart-periods .period-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    UI_STATE.currentPeriod = e.target.dataset.period;
                    if (UI_STATE.currentSymbol) loadChart();
                }
            });
        });

        async function loadChart() {
            const chartImg = document.getElementById('chart-img');
            const chartLoader = document.getElementById('chart-loader');
            chartImg.classList.remove('loaded');
            chartLoader.classList.add('active');
            const endpoint = UI_STATE.currentTab === 'price'
                ? `/api/stock/${UI_STATE.currentSymbol}/price_chart?period=${UI_STATE.currentPeriod}`
                : `/api/stock/${UI_STATE.currentSymbol}/pe_river?period=${UI_STATE.currentPeriod}`;
            try {
                const res = await fetch(endpoint);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                chartImg.src = `${data.image}?t=${new Date().getTime()}`;
                chartImg.onload = () => {
                    chartLoader.classList.remove('active');
                    chartImg.classList.add('loaded');
                };
            } catch (err) {
                chartLoader.classList.remove('active');
                showToast(err.message, 'error');
            }
        }

        document.getElementById('btn-load-more-news').addEventListener('click', () => {
            if (UI_STATE.currentSymbol) {
                loadNews(UI_STATE.currentSymbol, true);
            }
        });

        document.querySelector('main').addEventListener('scroll', (e) => {
            if (UI_STATE.newsHasMore && !UI_STATE.newsLoading && UI_STATE.currentSymbol && UI_STATE.mode === 'single') {
                const main = e.target;
                const threshold = 50;
                if (main.scrollHeight - main.scrollTop - main.clientHeight < threshold) {
                    loadNews(UI_STATE.currentSymbol, true);
                }
            }
        });

        document.getElementById('btn-analyze-news').addEventListener('click', async () => {
            if (!UI_STATE.currentSymbol) return;
            const btn = document.getElementById('btn-analyze-news');
            const originalHTML = btn.innerHTML;
            const newsItems = Array.from(document.querySelectorAll('#news-list .news-item')).map(item => {
                return {
                    title: item.querySelector('.news-title').textContent,
                    url: item.querySelector('a').href,
                    source: item.querySelector('.news-source').textContent,
                    date: item.querySelector('.news-date').textContent
                };
            });
            if (newsItems.length === 0) {
                showToast('目前沒有新聞可以分析', 'warning');
                return;
            }
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 分析中...';
            try {
                const res = await fetch(`/api/stock/${UI_STATE.currentSymbol}/analyze_news`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ news: newsItems })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '分析失敗');
                let html = `<p class="analysis-summary">${data.summary}</p><div class="analysis-details">`;
                data.details.forEach(item => {
                    html += `
                        <div class="analysis-item">
                            <div class="analysis-item-title"><a href="${item.url}" target="_blank" style="text-decoration: none; color: inherit;">${item.title}</a></div>
                            <div class="analysis-item-meta">
                                <span class="sentiment-badge sentiment-${item.sentiment_type}">${item.sentiment_label}</span>
                                <span>${item.source} · ${item.date}</span>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                document.getElementById('analysis-result-content').innerHTML = html;
                document.getElementById('analysis-modal').classList.add('active');
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        });

        document.getElementById('btn-close-modal').addEventListener('click', () => {
            document.getElementById('analysis-modal').classList.remove('active');
        });
        document.getElementById('analysis-modal').addEventListener('click', (e) => {
            if (e.target.id === 'analysis-modal') {
                document.getElementById('analysis-modal').classList.remove('active');
            }
        });

        // ────────────────────────────────────────
        // 比較模式
        // ────────────────────────────────────────
        document.getElementById('btn-start-compare').addEventListener('click', async () => {
            if (UI_STATE.compareSymbols.size < 2) {
                showToast('請至少選擇 2 支股票', 'warning');
                return;
            }
            const symbols = Array.from(UI_STATE.compareSymbols);
            const btn = document.getElementById('btn-start-compare');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 分析中...';
            try {
                // 取得股票名稱
                const nameMap = {};
                for (const sym of symbols) {
                    const res = await fetch(`/api/stock/${sym}/info`);
                    const data = await res.json();
                    nameMap[sym] = data.name || sym;
                }
                // 執行比較 API
                const res = await fetch('/api/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbols,
                        period: '1y',
                        names: nameMap
                    })
                });
                const compareData = await res.json();
                if (!res.ok) throw new Error(compareData.error);
                UI_STATE.compareData = compareData;
                UI_STATE.compareData.names = nameMap;
                renderCompareDashboard();
                switchMode('compare');
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-play"></i> 開始比較';
            }
        });

        function renderCompareDashboard() {
            if (!UI_STATE.compareData) return;
            const data = UI_STATE.compareData;
            const names = data.names || {};

            // 渲染基本面卡片
            const infoGrid = document.getElementById('compare-info-grid');
            infoGrid.innerHTML = '';
            data.symbols.forEach(sym => {
                const card = document.createElement('div');
                card.className = 'info-card glass';
                const price = data.performance[sym] !== undefined ? `${data.performance[sym]}%` : 'N/A';
                const vol = data.volatility[sym] !== undefined ? `${data.volatility[sym]}%` : 'N/A';
                card.innerHTML = `
                    <div style="font-weight: bold; margin-bottom: 8px;">${names[sym] || sym}</div>
                    <div style="font-size: 0.85em; line-height: 1.6;">
                        <div>期間績效: ${price}</div>
                        <div>年化波動: ${vol}</div>
                    </div>
                `;
                infoGrid.appendChild(card);
            });

            // 渲染配對相關性
            const pairsList = document.getElementById('compare-pairs-list');
            pairsList.innerHTML = '';
            data.pairs.forEach(pair => {
                const pairDiv = document.createElement('div');
                pairDiv.className = 'glass pair-item';
                pairDiv.style.marginBottom = '12px';
                const direction = pair.direction;
                const icon = pair.correlation > 0 ? '↗️' : '↙️';
                pairDiv.innerHTML = `
                    <div style="font-weight: bold; margin-bottom: 8px;">
                        ${icon} ${pair.name_a} × ${pair.name_b}
                    </div>
                    <div style="font-size: 0.85em; line-height: 1.8; color: #666;">
                        <div><strong>相關係數:</strong> ${pair.correlation.toFixed(3)} (${pair.strength}${direction})</div>
                        <div><strong>Beta:</strong> ${pair.pair[0]}→${pair.pair[1]}: ${pair.beta_a_on_b?.toFixed(3) || 'N/A'}, 反向: ${pair.beta_b_on_a?.toFixed(3) || 'N/A'}</div>
                    </div>
                `;
                pairsList.appendChild(pairDiv);
            });

            // 加載圖表
            loadCompareChart();
        }

        document.getElementById('compare-tabs').querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.getElementById('compare-tabs').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                loadCompareChart();
            });
        });

        document.getElementById('compare-chart-periods').querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                document.getElementById('compare-chart-periods').querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                const period = e.target.dataset.period;
                const btn = document.getElementById('btn-start-compare');
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 重新分析中...';
                try {
                    const symbols = Array.from(UI_STATE.compareSymbols);
                    const nameMap = UI_STATE.compareData.names;
                    const res = await fetch('/api/compare', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ symbols, period, names: nameMap })
                    });
                    const compareData = await res.json();
                    if (!res.ok) throw new Error(compareData.error);
                    UI_STATE.compareData = compareData;
                    UI_STATE.compareData.names = nameMap;
                    renderCompareDashboard();
                } catch (err) {
                    showToast(err.message, 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-play"></i> 開始比較';
                }
            });
        });

        function loadCompareChart() {
            const chartImg = document.getElementById('compare-chart-img');
            const chartLoader = document.getElementById('compare-chart-loader');
            const activeTab = document.querySelector('#compare-tabs .tab-btn.active').dataset.tab;
            
            chartImg.classList.remove('loaded');
            chartLoader.classList.add('active');

            if (!UI_STATE.compareData) return;
            if (activeTab === 'normalized' && UI_STATE.compareData.normalized_chart) {
                chartImg.src = `${UI_STATE.compareData.normalized_chart}?t=${new Date().getTime()}`;
            } else if (activeTab === 'heatmap' && UI_STATE.compareData.heatmap_chart) {
                chartImg.src = `${UI_STATE.compareData.heatmap_chart}?t=${new Date().getTime()}`;
            }
            chartImg.onload = () => {
                chartLoader.classList.remove('active');
                chartImg.classList.add('loaded');
            };
            chartImg.onerror = () => {
                chartLoader.classList.remove('active');
                showToast('圖表載入失敗', 'error');
            };
        }

        document.getElementById('btn-back-to-single').addEventListener('click', () => {
            UI_STATE.compareSymbols.clear();
            UI_STATE.compareData = null;
            loadPortfolio();
            if (UI_STATE.currentSymbol) {
                switchMode('single');
            } else {
                switchMode('single');
            }
        });

        document.getElementById('btn-analyze-compare-news').addEventListener('click', async () => {
            const symbols = Array.from(UI_STATE.compareSymbols);
            if (symbols.length < 2) {
                showToast('請選擇至少 2 支股票', 'warning');
                return;
            }

            // 抓取多支股票的新聞
            const btn = document.getElementById('btn-analyze-compare-news');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 分析中...';

            try {
                const allNews = [];
                const nameMap = UI_STATE.compareData.names;
                
                for (const sym of symbols) {
                    try {
                        const res = await fetch(`/api/stock/${sym}/news`);
                        const data = await res.json();
                        if (data.news) {
                            allNews.push(...data.news);
                        }
                    } catch (err) {
                        console.warn(`無法取得 ${sym} 新聞:`, err);
                    }
                }

                if (allNews.length === 0) {
                    showToast('無法取得新聞資料', 'warning');
                    return;
                }

                // 去重
                const uniqueNews = [];
                const seen = new Set();
                allNews.forEach(item => {
                    const key = item.url || item.title;
                    if (!seen.has(key)) {
                        seen.add(key);
                        uniqueNews.push(item);
                    }
                });

                // 調用多股新聞分析 API
                const analyzeRes = await fetch('/api/compare/analyze_news', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        symbols,
                        names: nameMap,
                        news: uniqueNews.slice(0, 5) // 只分析前 5 篇
                    })
                });
                const analysisData = await analyzeRes.json();
                if (!analyzeRes.ok) throw new Error(analysisData.error);

                // 渲染多股新聞分析結果
                const newsList = document.getElementById('compare-news-list');
                newsList.innerHTML = '';
                analysisData.forEach(newsItem => {
                    const newsDiv = document.createElement('div');
                    newsDiv.className = 'glass compare-news-item';
                    newsDiv.style.marginBottom = '15px';
                    newsDiv.style.padding = '15px';
                    
                    let html = `
                        <div style="font-weight: bold; margin-bottom: 10px;">
                            <a href="${newsItem.url}" target="_blank" style="color: inherit; text-decoration: none;">
                                ${newsItem.news_title}
                            </a>
                        </div>
                        <div style="font-size: 0.85em; color: #666; margin-bottom: 10px;">
                            ${newsItem.source} · ${newsItem.date}
                        </div>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                    `;
                    
                    newsItem.stocks.forEach(stock => {
                        const sentimentClass = stock.sentiment === 'positive' ? 'positive' : stock.sentiment === 'negative' ? 'negative' : 'neutral';
                        const sentimentLabel = stock.sentiment === 'positive' ? '正面' : stock.sentiment === 'negative' ? '負面' : '中立';
                        html += `
                            <div style="flex: 1; min-width: 200px; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.05);">
                                <div style="font-weight: bold; margin-bottom: 5px;">${stock.name}</div>
                                <div style="font-size: 0.85em; line-height: 1.5;">
                                    <div><span class="sentiment-badge sentiment-${sentimentClass}">${sentimentLabel}</span> (${(stock.score * 100).toFixed(0)}%)</div>
                                    <div style="color: #666; margin-top: 5px;">${stock.reason}</div>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    newsDiv.innerHTML = html;
                    newsList.appendChild(newsDiv);
                });

            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        });

        document.getElementById('btn-close-compare-modal').addEventListener('click', () => {
            document.getElementById('compare-interpret-modal').classList.remove('active');
        });

        // 初始化
        async function init() {
            await loadPortfolio();
        }

        init();
    </script>
</body>

</html>
